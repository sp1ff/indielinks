# Docker Compose file enabling local development for indielinks.

# At this point, it just stands-up a local, three-node ScyllaDB
# cluster. In particular, the indielinks binary is intended to be run
# locally on "bare metal" (i.e. not in a Docker container). I'll
# containerize it at some point, probably when I move from EC2 to ECS
# in the (AWS) cloud, at which point I may add it here.

name: indielinks

# This is important; we need to guarantee static IP addresses inside
# the network created by `docker compose` for each ScyllaDB host. If
# you change this (either the subnet, or the static IPs assigned
# below), you'll need to change the indielinks config files used
# during testing.

# If `docker compose` complains that this pool "... overlaps with
# other one on this address space", just say:
#
# ```
# docker network ls -q | xargs docker network inspect --format '{{.Name}}: {{range .IPAM.Config}}{{.Subnet}}{{end}}'
# ```
#
# and pick another /24 network.
networks:
  scylla-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.11.0.0/24

services:

  scylla-node-1:
    container_name: scylla-node-1
    image: scylladb/scylla:latest
    command: --smp 1 --alternator-port 8042 --alternator-write-isolation only_rmw_uses_lwt --rf-rack-valid-keyspaces=true --rack=rack1  --broadcast-rpc-address 172.11.0.4 --native-transport-port 9042 # always_use_lwt?
    # Port numbers chosen so as not to collide with my local SycllaDB instance
    ports:
      - 9043:9042 # Cassandra native protocol
      - 8043:8042 # Alternator port
    networks:
      scylla-net:
        ipv4_address: 172.11.0.2

  scylla-node-2:
    container_name: scylla-node-2
    image: scylladb/scylla:latest
    command: --smp 1 --seeds=scylla-node-1  --alternator-port 8042 --alternator-write-isolation only_rmw_uses_lwt --rf-rack-valid-keyspaces=true --rack=rack2 --broadcast-rpc-address 172.11.0.3 --native-transport-port 9042
    ports:
      - 9044:9042 # Cassandra native protocol
      - 8044:8042 # Alternator port
    networks:
      scylla-net:
        ipv4_address: 172.11.0.3
    depends_on:
      - scylla-node-1

  scylla-node-3:
    container_name: scylla-node-3
    image: scylladb/scylla:latest
    command: --smp 1 --seeds=scylla-node-1 --alternator-port 8042 --alternator-write-isolation only_rmw_uses_lwt --rf-rack-valid-keyspaces=true --rack=rack3 --broadcast-rpc-address 172.11.0.4 --native-transport-port 9042
    ports:
      - 9045:9042 # Cassandra native protocol
      - 8045:8042 # Alternator port
    networks:
      scylla-net:
        ipv4_address: 172.11.0.4
    depends_on:
      - scylla-node-1

