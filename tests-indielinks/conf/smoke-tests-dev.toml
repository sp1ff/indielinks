# `smoke-tests` configuration suitable for development.
# Assumes you've run `../../infra/scylla-up` and are
# somehow running a development build of indielinks (with
# the public endpoint at localhost:20679).

runner.log-level = "DEBUG"
runner.logging = true
runner.no-setup = false
runner.no-teardown = true
runner.enforce-single-threaded=true

domain.single-node.indielinks = "http://indiemark.local:20679"
domain.single-node.ops = "http://localhost:20680"
domain.single-node.grpc = "127.0.0.1:20681"
domain.single-node.local-state-dir = "."
domain.single-node.indielinks-alternator-config-file = "indielinksd-alternator.toml"
domain.single-node.indielinks-scylla-config-file = "indielinksd-scylla.toml"

domain.clustered.indielinks-scylla-cluster-config-base = "../conf/indielinksd-scylla-"
domain.clustered.indielinks-alternator-cluster-config-base = "../conf/indielinksd-alternator-"
domain.clustered.nodes = [["http://indiemark.local:20679", "http://127.0.0.1:20680", "127.0.0.1:20681"],
                          ["http://indiemark.local:20682", "http://127.0.0.1:20683", "127.0.0.1:20684"],
                          ["http://indiemark.local:20685", "http://127.0.0.1:20686", "127.0.0.1:20687"]]
domain.clustered.cluster-size = 3
domain.clustered.haproxy-id = 0
domain.clustered.haproxy-port = 20673
# This needs to aggree with the `log-file` item in `indielinksd-{alternator,scylla}-{0,1,2,3,4}.toml`
domain.clustered.cluster-local-state-base = "/tmp/indielinksd-cluster-"

domain.username = "sp1ff"
